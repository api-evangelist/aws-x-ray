rules:
  xray-operation-summary:
    description: All operations must have a summary starting with "AWS X-Ray"
    severity: warn
    given: "$.paths[*][get,post,put,delete,patch]"
    then:
      field: summary
      function: pattern
      functionOptions:
        match: "^AWS X-Ray"
  xray-operation-id:
    description: All operations must have an operationId
    severity: error
    given: "$.paths[*][get,post,put,delete,patch]"
    then:
      field: operationId
      function: truthy
  xray-info-title:
    description: Info object must have a title
    severity: error
    given: "$.info"
    then:
      field: title
      function: truthy
  xray-response-description:
    description: All responses must have a description
    severity: error
    given: "$.paths[*][*].responses[*]"
    then:
      field: description
      function: truthy
  xray-microcks-annotation:
    description: Operations should have x-microcks-operation annotation
    severity: info
    given: "$.paths[*][get,post,put,delete,patch]"
    then:
      field: x-microcks-operation
      function: truthy

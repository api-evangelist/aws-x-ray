aid: aws-x-ray
name: AWS X-Ray
description: >-
  AWS X-Ray is a service that helps developers analyze and debug distributed
  applications by providing end-to-end tracing of requests as they travel
  through the application, identifying performance bottlenecks and errors. It is
  now part of Amazon CloudWatch Application Signals for unified observability.
